name: Ubuntu-KDE-Tailscale

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Install Tailscale menggunakan Official Action (Di Linux ini lancar!)
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}

      # 2. Update & Install KDE Plasma + XRDP
      - name: Install KDE and XRDP
        run: |
          sudo apt-get update
          # Menggunakan DEBIAN_FRONTEND=noninteractive agar tidak muncul popup saat install
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y kubuntu-desktop xrdp
          
          # Konfigurasi XRDP agar menggunakan KDE (Plasma)
          echo "startplasma-x11" > ~/.xsession
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp

      # 3. Setup User untuk Login
      - name: Setup User
        run: |
          # Username default github runner adalah 'runner'
          # Kita set password agar bisa login via RDP
          echo "runner:P@ssw0rd!" | sudo chpasswd
          sudo adduser runner sudo

      # 4. Tampilkan IP Tailscale dan Jaga agar tetap hidup
      - name: Connection Info
        run: |
          TS_IP=$(tailscale ip -4)
          echo "============================================"
          echo "Koneksi Tailscale Berhasil!"
          echo "IP Ubuntu kamu: $TS_IP"
          echo "Username: runner"
          echo "Password: P@ssw0rd!"
          echo "============================================"
          # Jaga runner tetap hidup selama 6 jam
          sleep 21600
