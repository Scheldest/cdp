name: Tailscale-RDP-AuthKey

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale-setup.exe
          Start-Process -FilePath .\tailscale-setup.exe -ArgumentList "/quiet /norestart" -Wait

      - name: Connect Tailscale
        shell: pwsh
        run: |
          # Menjalankan Tailscale dengan Auth Key
          & 'C:\Program Files\Tailscale\tailscale.exe' up --authkey ${{ secrets.TS_AUTH_KEY }}
          
          # Ambil IP Tailscale untuk mempermudah kamu
          $tsIp = & 'C:\Program Files\Tailscale\tailscale.exe' ip -4
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "KONEKSI BERHASIL!" -ForegroundColor Green
          Write-Host "IP RDP ANDA: $tsIp" -ForegroundColor Cyan
          Write-Host "User: runneradmin | Pass: P@ssw0rd!" -ForegroundColor Yellow
          Write-Host "==========================================" -ForegroundColor Green

      - name: Setup Windows RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "P@ssw0rd!" -Force)

      - name: Keep Alive (6 Jam)
        run: Start-Sleep -Seconds 21600
